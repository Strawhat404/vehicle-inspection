services:
  mysql:
    image: mysql:8.4
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: roadsafe
      MYSQL_USER: roadsafe
      MYSQL_PASSWORD: roadsafe_password
    volumes:
      - mysql_data:/var/lib/mysql:z
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - roadsafe_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./unit_tests:/unit_tests:ro
      - ./API_tests:/API_tests:ro
      - ./backend:/backend
    environment:
      PORT: 4000
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: roadsafe
      DB_USER: roadsafe
      DB_PASSWORD: roadsafe_password
      SESSION_TTL_HOURS: 8
      IP_RATE_LIMIT_PER_MIN: 300
      USER_RATE_LIMIT_PER_MIN: 60
      TLS_ENABLED: 'false'
      FRONTEND_ORIGIN: https://localhost
      SENSITIVE_REGEX_RULES: ssn::\\b\\d{3}-\\d{2}-\\d{4}\\b,ssn_compact::\\b\\d{9}\\b
      SENSITIVE_DICTIONARY_TERMS: social security number,ssn
      DATA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      AES_256_KEY_HEX: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    healthcheck:
      test: ['CMD', 'node', 'src/healthcheck.js']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - roadsafe_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1/']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - roadsafe_net

  caddy:
    image: caddy:2-alpine
    restart: on-failure
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - '443:443'
      - '80:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - roadsafe_net

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  roadsafe_net:
    driver: bridge
